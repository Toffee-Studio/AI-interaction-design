name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=packages/interactions

      - name: Validate package (publint)
        run: npx publint packages/interactions

      - name: Publish
        run: npm publish --workspace=packages/interactions --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
