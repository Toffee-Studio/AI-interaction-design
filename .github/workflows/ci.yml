name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck --workspace=packages/interactions

      - name: Lint
        run: npm run lint --workspace=packages/interactions

      - name: Test
        run: npm run test --workspace=packages/interactions

      - name: Build
        run: npm run build --workspace=packages/interactions

      - name: Validate package exports (publint)
        run: npx publint packages/interactions

      - name: Validate types (arethetypeswrong)
        run: npx attw --pack packages/interactions
